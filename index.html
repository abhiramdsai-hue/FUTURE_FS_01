<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <!-- ===== NAVIGATION ===== -->
  <nav id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-bracket">&lt;</span>AD<span class="logo-bracket">/&gt;</span>
      </a>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">

      <ul class="nav-links" id="nav-links">

        <li><a href="about.html" class="nav-link">About</a></li>

      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <canvas id="particle-canvas"></canvas>
    </div>
    <div class="hero-content">

      <h1 class="hero-title fade-in-up" style="animation-delay:0.5s">
        Hi, I am <span class="gradient-text">Abhiram Datla</span>
      </h1>
      <div class="hero-subtitle fade-in-up" style="animation-delay:0.8s">
        <span class="static-text">Aspiring Developer</span>
        <span class="separator"> | </span>
        <span class="static-highlight">Tech Enthusiast</span>
      </div>
      <div class="hero-cta fade-in-up" style="animation-delay:1.2s">
        <a href="projects.html" class="btn btn-primary">View My Work</a>
        <a href="contact.html" class="btn btn-outline">Get In Touch</a>
      </div>

      <!-- Quick-nav cards -->
      <div class="home-nav-grid fade-in-up" style="animation-delay:1.6s">
        <a href="about.html" class="home-nav-card"><i class="fas fa-user"></i><span>About</span></a>
        <a href="skills.html" class="home-nav-card"><i class="fas fa-code"></i><span>Skills</span></a>
        <a href="education.html" class="home-nav-card"><i class="fas fa-graduation-cap"></i><span>Education</span></a>
        <a href="certificates.html" class="home-nav-card"><i
            class="fas fa-certificate"></i><span>Certificates</span></a>
        <a href="projects.html" class="home-nav-card"><i class="fas fa-rocket"></i><span>Projects</span></a>
        <a href="contact.html" class="home-nav-card"><i class="fas fa-envelope"></i><span>Contact</span></a>
      </div>
    </div>

  </section>

    <div class="footer-glow"></div>
    <div class="container footer-inner">
      <a href="index.html" class="footer-logo">
        <span class="logo-bracket">&lt;</span>AD<span class="logo-bracket">/&gt;</span>
      </a>
      <p class="footer-text">© 2026 Abhiram Datla. All rights reserved.</p>
      <div class="footer-socials">
        <a href="mailto:abhiramdatla@gmail.com" aria-label="Email" class="social-icon"><i

        <a href="https://github.com/abhiramdsai-hue" target="_blank" rel="noopener noreferrer" aria-label="GitHub"
          class="social-icon"><i class="fab fa-github"></i></a>

  <!-- Back to top -->
  <button id="back-to-top" aria-label="Back to top">
    <i class="fas fa-chevron-up"></i>
  </button>

  <script src="script.js"></script>
